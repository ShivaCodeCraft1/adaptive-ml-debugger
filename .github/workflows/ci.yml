name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Install dev dependencies if not in requirements.txt
        pip install pytest httpx

    - name: Run Tests
      env:
        OPENAI_API_KEY: "dummy-key-for-tests"
        MLFLOW_TRACKING_URI: "sqlite:///test_mlflow.db"
      run: |
        # Create state directories to ensure tests don't fail on missing paths
        mkdir -p data checkpoints logs configs
        
        # Run the test suite
        pytest tests/ -v